services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: development
      DATABASE_URL: "file:/app/data/aquasachet.db"
    volumes:
      - aquasachet-db:/app/data
      # Hot-reload: mount source so tsx watch picks up changes
      - ./server:/app/server
      - ./drizzle:/app/drizzle
      - ./shared:/app/shared
      - ./lib/store.ts:/app/lib/store.ts

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: docker/odoo/Dockerfile
    restart: unless-stopped
    ports:
      - "8069:8069"
      - "8072:8072"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./odoo-19.0:/odoo
      - odoo-data:/var/lib/odoo
      - ./docker/odoo/odoo.conf:/etc/odoo/odoo.conf:ro

volumes:
  pgdata:
  odoo-data:
  aquasachet-db:
